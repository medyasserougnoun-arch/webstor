<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebStore | Création Web Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Variables de couleurs */
        :root[data-theme="light"] {
            --bg: #ffffff; --text: #0a0a0a; --card: #f8f9fa; --primary: #0066FF; --border: #eee; --shadow: rgba(0,0,0,0.1);
        }
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --text: #ffffff; --card: #1a1a1a; --primary: #3385ff; --border: #333; --shadow: rgba(255,255,255,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s ease; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: var(--bg); display: flex; justify-content: space-between;
            align-items: center; padding: 0 8%; z-index: 2000; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 600; cursor: pointer; }
        .nav-links a:hover { color: var(--primary); }
        .controls { display: flex; gap: 15px; align-items: center; }

        /* Pages */
        .page { display: none; padding-top: 80px; min-height: 100vh; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Accueil (Hero) */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 20px; }
        .hero span { color: var(--primary); }
        .btn-main { padding: 15px 40px; background: var(--primary); color: white; border-radius: 50px; text-decoration: none; font-weight: 700; }

        /* Services (Cards) */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 8%; }
        .card { background: var(--card); border-radius: 25px; overflow: hidden; border: 1px solid var(--border); text-align: center; padding-bottom: 25px; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px var(--shadow); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .price { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin: 15px 0; }

        /* Contact */
        .contact-box { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .social-btns { display: flex; gap: 20px; margin-top: 30px; }
        .s-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; text-decoration: none; }
        .gmail { background: #EA4335; }
        .wa { background: #25D366; }
        .insta { background: #E1306C; }

        /* Boutique / Langue / Theme Controls */
        select, .theme-toggle { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 10px; cursor: pointer; }
        
        [dir="rtl"] .nav-links { flex-direction: row-reverse; }

        @media (max-width: 768px) {
            .nav-links { display: none; } /* Pour un vrai projet, on ferait un menu burger */
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Web<span>Store</span></div>
        <div class="nav-links">
            <a onclick="showPage('home')" id="ln-home">Accueil</a>
            <a onclick="showPage('services')" id="ln-serv">Services</a>
            <a onclick="showPage('contact')" id="ln-cont">Contact</a>
        </div>
        <div class="controls">
            <select onchange="changeLang(this.value)">
                <option value="fr">FR</option>
                <option value="ar">AR</option>
                <option value="en">EN</option>
            </select>
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <div id="home" class="page active">
        <section class="hero">
            <h1 id="h-title">Créez votre <span>Succès Digital</span></h1>
            <p id="h-desc" style="margin-bottom: 30px;">Qualité professionnelle entre 100 DH et 500 DH.</p>
            <a onclick="showPage('services')" class="btn-main" id="h-btn">Découvrir nos offres</a>
        </section>
    </div>

    <div id="services" class="page">
        <h2 style="text-align: center; margin-top: 40px;" id="s-title">Nos Solutions</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=500" alt="Site Vitrine">
                <h3 style="margin-top:20px;">Site Vitrine</h3>
                <span class="price">100 DH</span>
                <a href="https://wa.me/212647205376?text=Bonjour, je souhaite acheter le site à 100DH" target="_blank" class="btn-main" style="background:#25D366;">WhatsApp</a>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500" alt="Site Business">
                <h3 style="margin-top:20px;">Site Business</h3>
                <span class="price">300 DH</span>
                <a href="https://wa.me/212647205376?text=Bonjour, je souhaite acheter le site à 300DH" target="_blank" class="btn-main" style="background:#25D366;">WhatsApp</a>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=500" alt="Ecommerce">
                <h3 style="margin-top:20px;">E-commerce</h3>
                <span class="price">500 DH</span>
                <a href="https://wa.me/212647205376?text=Bonjour, je souhaite acheter le site à 500DH" target="_blank" class="btn-main" style="background:#25D366;">WhatsApp</a>
            </div>
        </div>
    </div>

    <div id="contact" class="page">
        <div class="contact-box">
            <h2 id="c-title">Parlons de votre projet</h2>
            <div class="social-btns">
                <a href="mailto:medyasserougnou@gmail.com" class="s-btn gmail" target="_blank"><i class="fas fa-envelope"></i></a>
                <a href="https://wa.me/212647205376" class="s-btn wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://instagram.com/yasserdesienere" class="s-btn insta" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Gestion des Pages
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // Mode Sombre
        function toggleTheme() {
            const doc = document.documentElement;
            const isDark = doc.getAttribute('data-theme') === 'dark';
            doc.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle i').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
        }

        // Traductions
        const trans = {
            fr: { 
                home: "Accueil", serv: "Services", cont: "Contact", 
                title: "Créez votre <span>Succès Digital</span>", 
                desc: "Qualité professionnelle entre 100 DH et 500 DH.", 
                btn: "Découvrir nos offres", stitle: "Nos Solutions", ctitle: "Parlons de votre projet"
            },
            en: { 
                home: "Home", serv: "Services", cont: "Contact", 
                title: "Create your <span>Digital Success</span>", 
                desc: "Professional quality between 100 DH and 500 DH.", 
                btn: "View Offers", stitle: "Our Solutions", ctitle: "Let's talk about your project"
            },
            ar: { 
                home: "الرئيسية", serv: "خدماتنا", cont: "اتصل بنا", 
                title: "اصنع <span>نجاحك الرقمي</span>", 
                desc: "جودة احترافية بين 100 درهم و 500 درهم.", 
                btn: "اكتشف عروضنا", stitle: "حلولنا", ctitle: "لنناقش مشروعك"
            }
        };

        function changeLang(lang) {
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            const content = trans[lang];
            
            document.getElementById('ln-home').innerText = content.home;
            document.getElementById('ln-serv').innerText = content.serv;
            document.getElementById('ln-cont').innerText = content.cont;
            document.getElementById('h-title').innerHTML = content.title;
            document.getElementById('h-desc').innerText = content.desc;
            document.getElementById('h-btn').innerText = content.btn;
            document.getElementById('s-title').innerText = content.stitle;
            document.getElementById('c-title').innerText = content.ctitle;
        }
    </script>
</body>
</html>
